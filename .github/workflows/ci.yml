name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install ruff

      - name: Ruff
        run: python -m ruff check app tests

      - name: Pytest unit (SQLite in-memory, Redis mocked)
        run: pytest tests/unit -v --tb=short

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          FASTLM_DB_PASSWORD=fastlm_dev_only
          FASTLM_ADMIN_SECRET=ci-fastlm-admin-secret-for-gha
          OPENAI_API_KEY=
          EOF

      - name: Docker compose up
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 50); do
            curl -fsS http://127.0.0.1:8001/health && exit 0
            sleep 2
          done
          exit 1

      - name: Install test deps and SDK
        run: |
          pip install -r requirements.txt -r tests/requirements.txt
          pip install ./sdk

      - name: Pytest integration (stream + SDK)
        env:
          FASTLM_BASE: http://127.0.0.1:8001
          FASTLM_ADMIN_SECRET: ci-fastlm-admin-secret-for-gha
        run: pytest tests/test_stream.py -v --tb=short

      - name: Docker compose down
        if: always()
        run: docker compose down -v
